name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Clean invalid resource files
        run: |
          find . -path "*/src/main/res/*" -name "*.js" -type f -delete || true
          find . -name "h.js" -type f -delete || true

      - name: Show Gradle projects
        run: ./gradlew projects

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-build-cache

      - name: Find APK files
        run: |
          echo "Searching APK files..."
          find . -name "*.apk" -type f -print

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          find . -name "*.apk" -type f -exec cp {} artifacts/ \;
          ls -la artifacts
          test "$(find artifacts -name '*.apk' | wc -l)" -gt 0

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RabbiHossainLTD-APK
          path: artifacts/*.apk
