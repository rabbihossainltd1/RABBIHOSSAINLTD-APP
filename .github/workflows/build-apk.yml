name: Build Debug APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 ─────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # ── 3. Cache Gradle files ─────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Grant execute permission to gradlew ────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # ── 5. Validate Gradle wrapper ────────────────────────────────────────
      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      # ── 6. Build Debug APK ────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2048m"

      # ── 7. Upload APK artifact ────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: RabbiHossainLTD-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # ── 8. Display APK info ───────────────────────────────────────────────
      - name: Display APK info
        run: |
          echo "✅ APK built successfully!"
          ls -lh app/build/outputs/apk/debug/
