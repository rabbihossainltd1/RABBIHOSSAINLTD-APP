name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Clean invalid resource files
        run: |
          find app/src/main/res -name "*.js" -type f -delete || true
          find app/src/main/res -name "h.js" -type f -delete || true

      - name: Build APK
        run: ./gradlew clean assembleDebug assembleRelease --stacktrace --no-build-cache

      - name: Show APK files
        run: find . -name "*.apk" -type f

      - name: Upload all APK files
        uses: actions/upload-artifact@v4
        with:
          name: RabbiHossainLTD-APK
          path: |
            **/build/outputs/**/*.apk
