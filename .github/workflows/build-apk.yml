name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Clean invalid resource files
        run: |
          find . -path "*/src/main/res/*" -name "*.js" -type f -delete || true
          find . -name "h.js" -type f -delete || true

      - name: Show project structure
        run: |
          echo "Root files:"
          ls -la
          echo "Gradle files:"
          find . -maxdepth 3 \( -name "*.gradle" -o -name "*.gradle.kts" -o -name "settings.gradle" -o -name "settings.gradle.kts" \) -print

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-build-cache

      - name: Prepare APK artifact
        run: |
          mkdir -p artifacts
          find . -name "*.apk" -type f -print -exec cp {} artifacts/ \;
          ls -la artifacts
          test "$(find artifacts -name '*.apk' | wc -l)" -gt 0

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RabbiHossainLTD-APK
          path: artifacts/*.apk
          if-no-files-found: error
          
